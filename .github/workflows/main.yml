name: Frontend - Production Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: SonarQube scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: recipeuiacr.azurecr.io
          username: ${{ secrets.ACR_UI_USERNAME }}
          password: ${{ secrets.ACR_UI_PASSWORD }}

      - name: Build and push production image
        run: |
          docker build -t recipeuiacr.azurecr.io/recipe-frontend:${{ github.sha }} .
          docker build -t recipeuiacr.azurecr.io/recipe-frontend:latest .
          docker push recipeuiacr.azurecr.io/recipe-frontend:${{ github.sha }}
          docker push recipeuiacr.azurecr.io/recipe-frontend:latest

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: recipeuiacr.azurecr.io/recipe-frontend:latest
          format: table
          exit-code: 0
        env:
          TRIVY_USERNAME: ${{ secrets.ACR_UI_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.ACR_UI_PASSWORD }}

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: recipe-ui-dev
          images: recipeuiacr.azurecr.io/recipe-frontend:${{ github.sha }}
